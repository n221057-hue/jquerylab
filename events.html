<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Events</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .box {
      width: 100px;
      height: 100px;
      background: blue;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      margin-bottom: 10px;
    }

    #dynamicArea {
      width: 200px;
      height: 60px;
      border: 1px dashed black;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px;
    }

    #eventLogger {
      border: 1px solid black;
      height: 120px;
      overflow-y: auto;
      padding: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>1. Mouse Events</h2>
<div id="mouseBox" class="box">Click Me</div>
<p id="mouseStatus">Status: Waiting</p>

<hr>

<h2>2. Keyboard Events</h2>
<input type="text" id="keyboardInput" placeholder="Type here">
<p id="keyboardStatus">Last Key: None</p>

<hr>

<h2>3. Form Events</h2>
<form id="form">
  <input type="text" id="name" placeholder="Enter name"><br><br>

  <select id="country">
    <option value="">Select Country</option>
    <option value="India">India</option>
    <option value="USA">USA</option>
  </select><br><br>

  <button type="submit">Submit</button>
</form>

<hr>

<h2>4. on() and off()</h2>
<div id="dynamicArea">Hover here</div>

<button id="onBtn">ON</button>
<button id="offBtn">OFF</button>

<hr>

<h2>5. Event Logger</h2>
<div id="eventLogger"></div>
<button id="clearLog">Clear Log</button>

<script>

// function to log events
function log(msg){
  $("#eventLogger").prepend("<div>" + msg + "</div>");
}

$(document).ready(function(){

  // 1. Mouse Events
  $("#mouseBox").click(function(){
    log("Clicked");
  });

  $("#mouseBox").dblclick(function(){
    log("Double Clicked");
  });

  $("#mouseBox").mouseenter(function(){
    $(this).css("background","green");
    log("Mouse Enter");
  });

  $("#mouseBox").mouseleave(function(){
    $(this).css("background","blue");
    log("Mouse Leave");
  });

  $("#mouseBox").hover(
    function(){
      $("#mouseStatus").text("Hovering");
    },
    function(){
      $("#mouseStatus").text("Not Hovering");
    }
  );

  // 2. Keyboard Events
  $("#keyboardInput").keydown(function(e){
    log("KeyDown: " + e.key);
  });

  $("#keyboardInput").keyup(function(e){
    $("#keyboardStatus").text("Last Key: " + e.key);
  });

  // 3. Form Events
  $("#name").focus(function(){
    $(this).css("border","2px solid green");
    log("Input Focus");
  });

  $("#name").blur(function(){
    $(this).css("border","1px solid black");
    log("Input Blur");
  });

  $("#name").change(function(){
    log("Changed: " + $(this).val());
  });

  $("#country").change(function(){
    log("Country: " + $(this).val());
  });

  $("#form").submit(function(e){
    e.preventDefault();
    alert("Form Submitted");
    log("Form Submitted");
  });

  // 4. on() and off()
  $("#onBtn").click(function(){
    $("#dynamicArea").on({
      mouseenter: function(){
        $(this).css("background","lightgreen").text("Mouse In");
        log("on(): Enter");
      },
      mouseleave: function(){
        $(this).css("background","white").text("Mouse Out");
        log("on(): Leave");
      },
      click: function(){
        alert("Clicked using on()");
        log("on(): Click");
      }
    });
  });

  $("#offBtn").click(function(){
    $("#dynamicArea").off();
    $("#dynamicArea").text("Events Removed").css("background","white");
    log("Events Removed");
  });

  // 5. Clear Log
  $("#clearLog").click(function(){
    $("#eventLogger").empty();
  });

});

</script>

</body>
</html>
