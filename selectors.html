<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Selectors</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .highlight {
      background: yellow;
    }

    .box {
      margin: 10px 0;
    }
  </style>
</head>

<body>

<h2>1. Basic Selectors</h2>
<p id="firstP">Paragraph 1 (ID)</p>
<p class="testClass">Paragraph 2 (Class)</p>
<span>Span Element</span>

<br>
<button id="idBtn">Select ID</button>
<button id="classBtn">Select Class</button>
<button id="tagBtn">Select Tag</button>

<hr>

<h2>2. Hierarchy Selectors</h2>
<ul id="parent">
  <li>Item 1</li>
  <li>Item 2</li>
  <li class="middle">Item 3
    <ul>
      <li>Nested Item</li>
    </ul>
  </li>
  <li>Item 4</li>
</ul>

<button id="childBtn">Children</button>
<button id="descBtn">Descendants</button>
<button id="sibBtn">Siblings</button>

<hr>

<h2>3. Attribute Selectors</h2>
<input type="text" name="user-name" value="Name"><br><br>
<input type="password" name="user-pass" value="Password"><br><br>

<button id="exactBtn">Exact</button>
<button id="startBtn">Starts With</button>
<button id="endBtn">Ends With</button>

<hr>

<h2>4. Filter Selectors</h2>
<div id="rows">
  <div>Row 0</div>
  <div>Row 1</div>
  <div>Row 2</div>
  <div>Row 3</div>
  <div>Row 4</div>
</div>

<button id="firstBtn">First & Last</button>
<button id="evenBtn">Even</button>
<button id="oddBtn">Odd</button>

<hr>

<h2>5. Visibility & Form</h2>
<p>Visible Paragraph</p>
<p style="display:none;">Hidden Paragraph</p>

<input type="text" placeholder="Visible Input">
<input type="hidden" value="Secret">

<br><br>
<button id="showHidden">Show Hidden</button>
<button id="inputBtn">Select Inputs</button>

<hr>

<button id="clear">Clear All</button>

<script>

function clearAll(){
  $(".highlight").removeClass("highlight");
}

$(document).ready(function(){

  // 1. Basic
  $("#idBtn").click(function(){
    clearAll();
    $("#firstP").addClass("highlight");
  });

  $("#classBtn").click(function(){
    clearAll();
    $(".testClass").addClass("highlight");
  });

  $("#tagBtn").click(function(){
    clearAll();
    $("span").addClass("highlight");
  });

  // 2. Hierarchy
  $("#childBtn").click(function(){
    clearAll();
    $("#parent > li").addClass("highlight");
  });

  $("#descBtn").click(function(){
    clearAll();
    $("#parent li").addClass("highlight");
  });

  $("#sibBtn").click(function(){
    clearAll();
    $(".middle ~ li").addClass("highlight");
  });

  // 3. Attribute
  $("#exactBtn").click(function(){
    clearAll();
    $('input[name="user-name"]').addClass("highlight");
  });

  $("#startBtn").click(function(){
    clearAll();
    $('input[name^="user-"]').addClass("highlight");
  });

  $("#endBtn").click(function(){
    clearAll();
    $('input[name$="pass"]').addClass("highlight");
  });

  // 4. Filters
  $("#firstBtn").click(function(){
    clearAll();
    $("#rows div:first, #rows div:last").addClass("highlight");
  });

  $("#evenBtn").click(function(){
    clearAll();
    $("#rows div:even").addClass("highlight");
  });

  $("#oddBtn").click(function(){
    clearAll();
    $("#rows div:odd").addClass("highlight");
  });

  // 5. Visibility
  $("#showHidden").click(function(){
    $("p:hidden").show().addClass("highlight");
  });

  $("#inputBtn").click(function(){
    clearAll();
    $(":input").addClass("highlight");
  });

  // Clear
  $("#clear").click(function(){
    clearAll();
  });

});

</script>

</body>
</html>
