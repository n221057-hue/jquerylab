<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Style</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .box {
      width: 80px;
      height: 80px;
      margin: 10px 0;
    }

    #cssBox { background: blue; }
    #dimBox {
      width: 100px;
      height: 100px;
      background: green;
      padding: 20px;
      border: 5px solid black;
    }

    #parentBox {
      width: 200px;
      height: 100px;
      background: gray;
      position: relative;
      margin-top: 10px;
    }

    #childBox {
      width: 40px;
      height: 40px;
      background: orange;
      position: absolute;
      top: 20px;
      left: 20px;
    }

    #scrollBox {
      width: 200px;
      height: 100px;
      overflow: scroll;
      border: 1px solid black;
    }

    #bigContent {
      width: 500px;
      height: 500px;
      background: lightblue;
    }

    #log {
      border: 1px solid black;
      height: 100px;
      overflow-y: auto;
      padding: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h2>1. css()</h2>
<div id="cssBox" class="box"></div>

<button id="getCss">Get Color</button>
<button id="setCss">Set Color</button>
<button id="multiCss">Multiple Style</button>

<hr>

<h2>2. width() & height()</h2>
<div id="dimBox">Box</div>

<button id="getWH">Get Size</button>
<button id="setWH">Set Size</button>

<hr>

<h2>3. innerWidth() & outerWidth()</h2>
<div id="log">Logs...</div>

<button id="innerBtn">Inner</button>
<button id="outerBtn">Outer</button>

<hr>

<h2>4. offset() & position()</h2>
<div id="parentBox">
  Parent
  <div id="childBox"></div>
</div>

<button id="getPos">Check Position</button>
<button id="move">Move</button>

<hr>

<h2>5. scrollTop() & scrollLeft()</h2>
<div id="scrollBox">
  <div id="bigContent">Scroll inside me</div>
</div>

<button id="scrollTopBtn">Go Top</button>
<button id="checkScroll">Check Scroll</button>

<script>
$(document).ready(function(){

  // 1. CSS
  $("#getCss").click(function(){
    alert($("#cssBox").css("background-color"));
  });

  $("#setCss").click(function(){
    $("#cssBox").css("background","red");
  });

  $("#multiCss").click(function(){
    $("#cssBox").css({
      "border":"3px solid black",
      "transform":"rotate(30deg)"
    });
  });

  // 2. width height
  $("#getWH").click(function(){
    alert("Width: " + $("#dimBox").width() +
          "\nHeight: " + $("#dimBox").height());
  });

  $("#setWH").click(function(){
    $("#dimBox").width(150).height(150);
  });

  // 3. inner outer
  $("#innerBtn").click(function(){
    let w = $("#dimBox").innerWidth();
    let h = $("#dimBox").innerHeight();
    $("#log").prepend("<div>Inner: " + w + " x " + h + "</div>");
  });

  $("#outerBtn").click(function(){
    let w = $("#dimBox").outerWidth();
    let h = $("#dimBox").outerHeight();
    $("#log").prepend("<div>Outer: " + w + " x " + h + "</div>");
  });

  // 4. position
  $("#getPos").click(function(){
    let off = $("#childBox").offset();
    let pos = $("#childBox").position();

    alert("Offset: " + off.top + "," + off.left +
          "\nPosition: " + pos.top + "," + pos.left);
  });

  $("#move").click(function(){
    $("#childBox").offset({top:300,left:100});
  });

  // 5. scroll
  $("#scrollTopBtn").click(function(){
    $("#scrollBox").scrollTop(0).scrollLeft(0);
  });

  $("#checkScroll").click(function(){
    alert("Top: " + $("#scrollBox").scrollTop() +
          "\nLeft: " + $("#scrollBox").scrollLeft());
  });

});
</script>

</body>
</html>
