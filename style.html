<!DOCTYPE html>

<html>
<head>

<title>jQuery Style</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$("p").css("color","red");

});

});

</script>

</head>

<body>

<h2>Style Manipulation</h2>

<p>Paragraph 1</p>
<p>Paragraph 2</p>

<button id="btn">Change Color</button>

</body>
</html>
