<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Traversing</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .highlight {
      background: yellow;
    }

    .box {
      width: 60px;
      height: 60px;
      margin: 5px;
      display: inline-block;
    }

    .blue { background: blue; }
    .red { background: red; }
    .green { background: green; }

    #log {
      border: 1px solid black;
      height: 120px;
      overflow-y: auto;
      margin-top: 10px;
      padding: 5px;
    }
  </style>
</head>

<body>

<h2>1. Parent / Parents</h2>
<div id="grandparent">
  Grandparent
  <div id="parent">
    Parent
    <button id="childBtn">Child Button</button>
  </div>
</div>

<button id="parentBtn">Parent</button>
<button id="parentsBtn">Grandparent</button>

<hr>

<h2>2. Children / Find</h2>
<div id="descDemo">
  <p>Text 1</p>
  <p class="badge">Text 2</p>
  <span class="badge">Text 3</span>
</div>

<button id="childrenBtn">Children</button>
<button id="findBtn">Find .badge</button>

<hr>

<h2>3. Siblings</h2>
<div id="sibDemo">
  <div>One</div>
  <div class="middle">Two</div>
  <div>Three</div>
</div>

<button id="nextBtn">Next</button>
<button id="prevBtn">Prev</button>
<button id="siblingsBtn">All Siblings</button>

<hr>

<h2>4. Filtering</h2>
<div id="filterDemo">
  <div class="box red"></div>
  <div class="box blue"></div>
  <div class="box green"></div>
  <div class="box blue"></div>
</div>

<button id="eqBtn">eq(2)</button>
<button id="filterBtn">Only Blue</button>
<button id="notBtn">Not Blue</button>

<hr>

<h2>Log</h2>
<div id="log"></div>
<button id="clear">Clear</button>

<script>

function highlight(el, text){
  $(".highlight").removeClass("highlight");
  el.addClass("highlight");
  $("#log").prepend("<div>" + text + "</div>");
}

$(document).ready(function(){

  // 1. Parent
  $("#parentBtn").click(function(){
    highlight($("#childBtn").parent(), "parent()");
  });

  $("#parentsBtn").click(function(){
    highlight($("#childBtn").parents("#grandparent"), "parents()");
  });

  // 2. Children / Find
  $("#childrenBtn").click(function(){
    highlight($("#descDemo").children(), "children()");
  });

  $("#findBtn").click(function(){
    highlight($("#descDemo").find(".badge"), "find(.badge)");
  });

  // 3. Siblings
  $("#nextBtn").click(function(){
    highlight($(".middle").next(), "next()");
  });

  $("#prevBtn").click(function(){
    highlight($(".middle").prev(), "prev()");
  });

  $("#siblingsBtn").click(function(){
    highlight($(".middle").siblings(), "siblings()");
  });

  // 4. Filtering
  $("#eqBtn").click(function(){
    highlight($("#filterDemo .box").eq(2), "eq(2)");
  });

  $("#filterBtn").click(function(){
    highlight($("#filterDemo .box").filter(".blue"), "filter(.blue)");
  });

  $("#notBtn").click(function(){
    highlight($("#filterDemo .box").not(".blue"), "not(.blue)");
  });

  // Clear
  $("#clear").click(function(){
    $(".highlight").removeClass("highlight");
    $("#log").empty();
  });

});

</script>

</body>
</html>
