<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Effects</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    .box {
      width: 100px;
      height: 100px;
      margin: 10px 0;
    }

    #basicBox { background: blue; }
    #fadeBox { background: green; }
    #slideBox { background: gray; text-align:center; color:white; line-height:100px; }
    #animBox {
      background: orange;
      position: relative;
    }
    #controlBox { background: red; }
  </style>
</head>

<body>

<h2>1. Show / Hide / Toggle</h2>
<div id="basicBox" class="box"></div>

<button id="hide">Hide</button>
<button id="show">Show</button>
<button id="toggle">Toggle</button>

<hr>

<h2>2. Fade Effects</h2>
<div id="fadeBox" class="box"></div>

<button id="fadeOut">Fade Out</button>
<button id="fadeIn">Fade In</button>
<button id="fadeToggle">Fade Toggle</button>

<hr>

<h2>3. Slide Effects</h2>
<div id="slideBox" class="box">Content</div>

<button id="slideUp">Slide Up</button>
<button id="slideDown">Slide Down</button>
<button id="slideToggle">Slide Toggle</button>

<hr>

<h2>4. Animate</h2>
<div id="animBox" class="box"></div>

<button id="animate">Start Animation</button>
<button id="reset">Reset</button>

<hr>

<h2>5. Control (stop, delay, finish)</h2>
<div id="controlBox" class="box"></div>

<button id="chain">Start Chain</button>
<button id="stop">Stop</button>
<button id="delay">Delay</button>
<button id="finish">Finish</button>

<script>
$(document).ready(function(){

  // 1. Show Hide Toggle
  $("#hide").click(function(){
    $("#basicBox").hide(500);
  });

  $("#show").click(function(){
    $("#basicBox").show(500);
  });

  $("#toggle").click(function(){
    $("#basicBox").toggle(500);
  });

  // 2. Fade
  $("#fadeOut").click(function(){
    $("#fadeBox").fadeOut(800);
  });

  $("#fadeIn").click(function(){
    $("#fadeBox").fadeIn(800);
  });

  $("#fadeToggle").click(function(){
    $("#fadeBox").fadeToggle(800);
  });

  // 3. Slide
  $("#slideUp").click(function(){
    $("#slideBox").slideUp(600);
  });

  $("#slideDown").click(function(){
    $("#slideBox").slideDown(600);
  });

  $("#slideToggle").click(function(){
    $("#slideBox").slideToggle(600);
  });

  // 4. Animate
  $("#animate").click(function(){
    $("#animBox").animate({left: "200px"}, 1000)
                 .animate({top: "50px"}, 500)
                 .animate({opacity: 0.5}, 500);
  });

  $("#reset").click(function(){
    $("#animBox").stop(true,true)
                 .css({left:"0px", top:"0px", opacity:1});
  });

  // 5. Control
  $("#chain").click(function(){
    $("#controlBox")
      .slideUp(1000)
      .slideDown(1000)
      .fadeOut(1000)
      .fadeIn(1000);
  });

  $("#stop").click(function(){
    $("#controlBox").stop();
  });

  $("#delay").click(function(){
    $("#controlBox")
      .delay(1000)
      .fadeOut(1000)
      .fadeIn(500);
  });

  $("#finish").click(function(){
    $("#controlBox").finish();
  });

});
</script>

</body>
</html>
