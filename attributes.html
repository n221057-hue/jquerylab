<!DOCTYPE html>

<html>
<head>

<title>jQuery Attributes</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>

$(document).ready(function(){

$("#btn").click(function(){

$("#img").attr("src","https://via.placeholder.com/200");

});

});

</script>

</head>

<body>

<h2>Attribute Example</h2>

<img id="img" src="C:\Users\sowmya\Downloads\imou.svg">

<br><br>

<button id="btn">Change Image</button>

</body>
</html>
