<!DOCTYPE html>
<html>
<head>
  <title>Simple jQuery Attributes</title>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <style>
    /* Box default style */
    #box {
      width: 100px;
      height: 100px;
      background: gray;
    }

    /* Class to add */
    .red {
      background: red;
    }
  </style>
</head>

<body>

<h2>1. attr() and removeAttr()</h2>
<img id="img" src="asda.svg" alt="Sample Image" title="My Image" width="100">

<br><br>
<button id="setAttr">Change Alt</button>
<button id="getAttr">Get Title</button>
<button id="removeAttr">Remove Title</button>

<hr>

<h2>2. val()</h2>
<input type="text" id="inputBox" placeholder="Type here">
<br><br>

<select id="selectBox">
  <option value="A">Option A</option>
  <option value="B">Option B</option>
</select>

<br><br>
<button id="getVal">Get Value</button>
<button id="setVal">Set Value</button>

<hr>

<h2>3. addClass(), removeClass(), toggleClass()</h2>

<!-- ✅ FIXED (no inline background) -->
<div id="box"></div>

<br>
<button id="addClass">Add Color</button>
<button id="removeClass">Remove Color</button>
<button id="toggleClass">Toggle Color</button>

<hr>

<h2>4. prop()</h2>
<input type="checkbox" id="check"> Disable Input
<br><br>

<input type="text" id="textInput" placeholder="I can be disabled">

<br><br>
<button id="checkProp">Check Status</button>
<button id="toggleProp">Toggle Disable</button>

<hr>

<h2>5. html() and text()</h2>
<div id="content">Hello</div>

<br>
<button id="setHTML">Set HTML</button>
<button id="setText">Set Text</button>

<script>
$(document).ready(function(){

  // 1. ATTR
  $("#setAttr").click(function(){
    $("#img").attr("alt","New Alt Text");
    alert("Alt changed");
  });

  $("#getAttr").click(function(){
    alert($("#img").attr("title"));
  });

  $("#removeAttr").click(function(){
    $("#img").removeAttr("title");
    alert("Title removed");
  });

  // 2. VAL
  $("#getVal").click(function(){
    alert("Input: " + $("#inputBox").val());
  });

  $("#setVal").click(function(){
    $("#inputBox").val("Hello!");
  });

  // 3. CLASS
  $("#addClass").click(function(){
    $("#box").addClass("red");
  });

  $("#removeClass").click(function(){
    $("#box").removeClass("red");
  });

  $("#toggleClass").click(function(){
    $("#box").toggleClass("red");
  });

  // 4. PROP
  $("#checkProp").click(function(){
    alert($("#check").prop("checked"));
  });

  $("#toggleProp").click(function(){
    let status = $("#textInput").prop("disabled");
    $("#textInput").prop("disabled", !status);
  });

  // 5. HTML & TEXT
  $("#setHTML").click(function(){
    $("#content").html("<b>Bold Text</b>");
  });

  $("#setText").click(function(){
    $("#content").text("<b>This is plain text</b>");
  });

});
</script>

</body>
</html>
